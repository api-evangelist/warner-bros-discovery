description: Warner Bros. Discovery does not operate a public developer
  portal and does not publish API rate-limit policy. Throttling, when
  applicable, sits inside the bilateral partner integration and is not
  publicly documented.
sources:
  - https://www.wbd.com/
notes: No public rate-limit policy. Limits, when applicable, are part of the
  bilateral partner integration agreement.
limits:
  - name: WBD Partner Integrations
    scope: contract
    metric: varies
    limit: see partnership agreement
    notes: Per-partner thresholds are negotiated bilaterally; not publicly
      documented.
policies:
  - name: Bilateral Governance
    description: Throttling and capacity expectations are documented inside
      the content-licensing or distribution agreement rather than via a
      public developer-portal contract.
