description: FinOps view of Warner Bros. Discovery at the corporate level.
  WBD does not bill API consumption; integration costs and revenues flow
  through content-licensing, distribution, and partnership settlements
  rather than a metered API invoice surface.
sources:
  - https://www.wbd.com/
notes: No corporate-level API invoice; FOCUS attribution flows through the
  partnership-settlement entity.
billingModel:
  pricingCategory: Custom Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Warner Bros. Discovery Partnerships
  ServiceCategory: Entertainment / Media
  ProviderName: Warner Bros. Discovery
  PublisherName: Warner Bros. Discovery, Inc.
  InvoiceIssuerName: Warner Bros. Discovery, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: partnership_settlement
    description: Negotiated settlement under the bilateral partnership /
      licensing agreement.
    unit: varies
    aggregation: sum
    dimensions:
      - brand
      - partner
principles:
  - name: Visibility
    description: Track partnership-level settlements at the corporate
      treasury layer; per-API consumption telemetry is partner-side.
  - name: Allocation
    description: Allocate partnership cost / revenue to the relevant WBD
      brand or business unit (Max, CNN, Studios, DC).
  - name: Optimization
    description: Optimization happens at partnership renegotiation; there
      is no in-flight metered usage to tune.
  - name: Accountability
    description: Corporate development and brand leadership own
      partnership terms; legal and finance own settlement.
