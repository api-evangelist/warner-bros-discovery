naftiko: 1.0.0-alpha2
info:
  label: Warner Bros. Discovery Content Partner API — Assets
  description: 'Warner Bros. Discovery Content Partner API — Assets. 1 operations. Lead operation: List Assets. Self-contained
    Naftiko capability covering one Warner Bros Discovery business surface.'
  tags:
  - Warner Bros Discovery
  - Assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WARNER_BROS_DISCOVERY_API_KEY: WARNER_BROS_DISCOVERY_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-partner-assets
    baseUri: https://api.warnermediasupplychain.com
    description: Warner Bros. Discovery Content Partner API — Assets business capability. Self-contained, no shared references.
    resources:
    - name: v1-assets
      path: /v1/assets
      operations:
      - name: listassets
        method: GET
        description: List Assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: deliveryId
          in: query
          type: string
          description: Filter assets by delivery ID
        - name: assetType
          in: query
          type: string
          description: Filter assets by type
    authentication:
      type: bearer
      token: '{{env.WARNER_BROS_DISCOVERY_API_KEY}}'
  exposes:
  - type: rest
    namespace: content-partner-assets-rest
    port: 8080
    description: REST adapter for Warner Bros. Discovery Content Partner API — Assets. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/assets
      name: v1-assets
      description: REST surface for v1-assets.
      operations:
      - method: GET
        name: listassets
        description: List Assets
        call: content-partner-assets.listassets
        with:
          deliveryId: rest.deliveryId
          assetType: rest.assetType
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-partner-assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Warner Bros. Discovery Content Partner API — Assets. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-assets
      description: List Assets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-partner-assets.listassets
      with:
        deliveryId: tools.deliveryId
        assetType: tools.assetType
      outputParameters:
      - type: object
        mapping: $.
