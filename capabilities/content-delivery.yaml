naftiko: 1.0.0-alpha2
info:
  label: WBD Content Delivery Workflow
  description: Unified workflow for Warner Bros. Discovery content delivery operations. Enables content partners to submit
    media deliveries, validate metadata against MMC specifications, track delivery status, and manage media assets through
    WBD's media supply chain for distribution across Max, HBO, Warner Bros., Discovery, CNN, and other WBD brands.
  tags:
  - Warner Bros. Discovery
  - Content Delivery
  - Media Supply Chain
  - Metadata
  - Entertainment
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    WBD_ACCESS_TOKEN: WBD_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: wbd-content
    baseUri: https://api.warnermediasupplychain.com
    description: Warner Bros. Discovery Content Partner API
    authentication:
      type: bearer
      token: '{{WBD_ACCESS_TOKEN}}'
    resources:
    - name: deliveries
      path: /v1/deliveries
      description: Content delivery management
      operations:
      - name: list-deliveries
        method: GET
        description: List all media content deliveries
        inputParameters:
        - name: status
          in: query
          type: string
          required: false
          description: Filter by delivery status
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum results to return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-delivery
        method: POST
        description: Submit a new content delivery
        inputParameters:
        - name: title
          in: body
          type: string
          required: true
          description: Content title
        - name: contentType
          in: body
          type: string
          required: true
          description: Type of content (feature, episode, etc.)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            title: '{{tools.title}}'
            contentType: '{{tools.contentType}}'
            manifestPath: '{{tools.manifestPath}}'
    - name: delivery-status
      path: /v1/deliveries/{deliveryId}/status
      description: Delivery status tracking
      operations:
      - name: get-delivery-status
        method: GET
        description: Get current processing status of a delivery
        inputParameters:
        - name: deliveryId
          in: path
          type: string
          required: true
          description: Delivery identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metadata-submit
      path: /v1/metadata
      description: Metadata submission
      operations:
      - name: submit-metadata
        method: POST
        description: Submit MMC metadata for content delivery
        inputParameters:
        - name: deliveryId
          in: body
          type: string
          required: false
          description: Associated delivery ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            deliveryId: '{{tools.deliveryId}}'
    - name: metadata-validate
      path: /v1/metadata/validate
      description: Metadata validation
      operations:
      - name: validate-metadata
        method: POST
        description: Validate metadata against WBD MMC schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            manifest: '{{tools.manifest}}'
    - name: assets
      path: /v1/assets
      description: Media asset management
      operations:
      - name: list-assets
        method: GET
        description: List media assets in the partner account
        inputParameters:
        - name: deliveryId
          in: query
          type: string
          required: false
          description: Filter assets by delivery
        - name: assetType
          in: query
          type: string
          required: false
          description: Filter by asset type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: wbd-delivery-api
    description: Unified REST API for WBD content delivery and media supply chain operations.
    resources:
    - path: /v1/deliveries
      name: deliveries
      description: Content delivery management
      operations:
      - method: GET
        name: list-deliveries
        description: List all media content deliveries
        call: wbd-content.list-deliveries
        with:
          status: rest.status
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-delivery
        description: Submit a new content delivery
        call: wbd-content.create-delivery
        with:
          title: rest.title
          contentType: rest.contentType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/deliveries/{deliveryId}/status
      name: delivery-status
      description: Delivery processing status
      operations:
      - method: GET
        name: get-delivery-status
        description: Get processing status for a delivery
        call: wbd-content.get-delivery-status
        with:
          deliveryId: rest.deliveryId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metadata/validate
      name: metadata-validation
      description: Metadata validation
      operations:
      - method: POST
        name: validate-metadata
        description: Validate MMC metadata before submission
        call: wbd-content.validate-metadata
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets
      name: assets
      description: Media asset management
      operations:
      - method: GET
        name: list-assets
        description: List media assets
        call: wbd-content.list-assets
        with:
          deliveryId: rest.deliveryId
          assetType: rest.assetType
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: wbd-delivery-mcp
    transport: http
    description: MCP server for AI-assisted WBD content delivery and supply chain operations.
    tools:
    - name: list-deliveries
      description: List all media content deliveries in the WBD partner supply chain
      hints:
        readOnly: true
        openWorld: false
      call: wbd-content.list-deliveries
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: create-delivery
      description: Submit a new media content delivery to WBD supply chain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wbd-content.create-delivery
      with:
        title: tools.title
        contentType: tools.contentType
      outputParameters:
      - type: object
        mapping: $.
    - name: get-delivery-status
      description: Get the current processing status of a WBD content delivery
      hints:
        readOnly: true
        openWorld: false
      call: wbd-content.get-delivery-status
      with:
        deliveryId: tools.deliveryId
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-metadata
      description: Validate MMC metadata against WBD specifications before submission
      hints:
        readOnly: true
        openWorld: false
      call: wbd-content.validate-metadata
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-metadata
      description: Submit MovieLabs MMC metadata for a content delivery
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wbd-content.submit-metadata
      with:
        deliveryId: tools.deliveryId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-assets
      description: List media assets associated with WBD deliveries
      hints:
        readOnly: true
        openWorld: false
      call: wbd-content.list-assets
      with:
        deliveryId: tools.deliveryId
        assetType: tools.assetType
      outputParameters:
      - type: object
        mapping: $.
