naftiko: 1.0.0-alpha2
info:
  label: Warner Bros. Discovery Content Partner API — Metadata
  description: 'Warner Bros. Discovery Content Partner API — Metadata. 2 operations. Lead operation: Submit Metadata. Self-contained
    Naftiko capability covering one Warner Bros Discovery business surface.'
  tags:
  - Warner Bros Discovery
  - Metadata
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WARNER_BROS_DISCOVERY_API_KEY: WARNER_BROS_DISCOVERY_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-partner-metadata
    baseUri: https://api.warnermediasupplychain.com
    description: Warner Bros. Discovery Content Partner API — Metadata business capability. Self-contained, no shared references.
    resources:
    - name: v1-metadata
      path: /v1/metadata
      operations:
      - name: submitmetadata
        method: POST
        description: Submit Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-metadata-validate
      path: /v1/metadata/validate
      operations:
      - name: validatemetadata
        method: POST
        description: Validate Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WARNER_BROS_DISCOVERY_API_KEY}}'
  exposes:
  - type: rest
    namespace: content-partner-metadata-rest
    port: 8080
    description: REST adapter for Warner Bros. Discovery Content Partner API — Metadata. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/metadata
      name: v1-metadata
      description: REST surface for v1-metadata.
      operations:
      - method: POST
        name: submitmetadata
        description: Submit Metadata
        call: content-partner-metadata.submitmetadata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/metadata/validate
      name: v1-metadata-validate
      description: REST surface for v1-metadata-validate.
      operations:
      - method: POST
        name: validatemetadata
        description: Validate Metadata
        call: content-partner-metadata.validatemetadata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-partner-metadata-mcp
    port: 9090
    transport: http
    description: MCP adapter for Warner Bros. Discovery Content Partner API — Metadata. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: submit-metadata
      description: Submit Metadata
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: content-partner-metadata.submitmetadata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-metadata
      description: Validate Metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: content-partner-metadata.validatemetadata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
