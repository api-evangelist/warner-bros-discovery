description: Warner Bros. Discovery does not operate a corporate developer
  portal or publish a paid API plan. Distribution APIs (Max, CNN, HBO, DC,
  studio licensing) flow through bilateral partnership and licensing
  agreements with broadcasters, distributors, and platforms. Trimmed scaffold
  to a single Contact Sales plan because no public API price list exists.
sources:
  - https://www.wbd.com/
notes: No public developer portal or API marketplace. Integrations are
  negotiated bilaterally as content-licensing or distribution agreements.
plans:
  - id: warner-bros-discovery-contact-sales
    name: Contact Sales
    type: enterprise
    description: API and data integrations with Warner Bros. Discovery are
      negotiated under bilateral content-licensing, distribution, and
      partnership agreements.
    entries:
      - label: Partnership Agreement
        name: partnership_agreement
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Bilateral Partnership Terms
      - name: Content Licensing
      - name: Distribution Agreements
